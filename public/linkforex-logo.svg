<svg width="1000" height="200" viewBox="0 0 1000 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- LINK text in cyan box -->
  <rect x="12" y="2" width="403" height="164" rx="20" fill="#00BCD4"/>
  <text x="40" y="130" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="110" font-weight="800" fill="white" letter-spacing="-2">LINK</text>
  
  <!-- FOREX text -->
  <text x="445" y="130" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="110" font-weight="800" fill="#2D3748" letter-spacing="-2">F</text>
  
  <!-- Network globe O -->
  <g transform="translate(587, 35)">
    <circle cx="50" cy="50" r="48" fill="#2D3748"/>
    <!-- Network nodes -->
    <circle cx="50" cy="15" r="3" fill="white"/>
    <circle cx="25" cy="30" r="3" fill="white"/>
    <circle cx="75" cy="30" r="3" fill="white"/>
    <circle cx="15" cy="50" r="3" fill="white"/>
    <circle cx="85" cy="50" r="3" fill="white"/>
    <circle cx="25" cy="70" r="3" fill="white"/>
    <circle cx="75" cy="70" r="3" fill="white"/>
    <circle cx="50" cy="85" r="3" fill="white"/>
    <circle cx="50" cy="50" r="3" fill="white"/>
    <!-- Network connections -->
    <line x1="50" y1="15" x2="25" y2="30" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="15" x2="75" y2="30" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="25" y1="30" x2="15" y2="50" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="75" y1="30" x2="85" y2="50" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="50" x2="25" y2="70" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="85" y1="50" x2="75" y2="70" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="25" y1="70" x2="50" y2="85" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="75" y1="70" x2="50" y2="85" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="50" x2="50" y2="15" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="50" x2="25" y2="30" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="50" x2="75" y2="30" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="50" x2="15" y2="50" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="50" x2="85" y2="50" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="50" x2="25" y2="70" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="50" x2="75" y2="70" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="50" y1="50" x2="50" y2="85" stroke="white" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- REX text -->
  <text x="695" y="130" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="110" font-weight="800" fill="#2D3748" letter-spacing="-2">REX</text>
  
  <!-- Arrow accent -->
  <path d="M870 20 L980 20 L980 90 L920 20 L980 20 L980 130" stroke="#00BCD4" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
